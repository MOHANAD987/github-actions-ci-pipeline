name: ci workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-workflow:
    name: CI Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build the app
        run: mvn clean package
        shell: bash

      - name: Test the app
        run: mvn test
        shell: bash
